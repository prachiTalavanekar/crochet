services:
  # Backend — Node/Express API
  - type: web
    name: crochet-store-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false   # set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # set this manually in Render dashboard
      - key: PORT
        value: 5000

  # Frontend — Vite/React (static site)
  - type: web
    name: crochet-store-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false   # set to your backend Render URL, e.g. https://crochet-store-backend.onrender.com
